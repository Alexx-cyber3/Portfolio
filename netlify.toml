[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# TanStack Start (Nitro) emits a Netlify-compatible build when the
# NITRO_PRESET below is set. If your build outputs to `.output/public`
# instead of `dist`, change `publish` above accordingly.
  NITRO_PRESET = "netlify"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
